<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyMath / mathQuiz</title>
</head>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
<body>
    <header>
        <div id="title_container">
            <a href="../index.html" class="title-link">
                <h1 id="title">StudyMath / mathQuiz</h1>
            </a>
        </div>
        <div id="nav_container">
            <nav>
                <ul>
                    <li><a href="./mathQuiz.html">Math Quiz</a></li>
                    <li><a href="./physicsQuiz.html">Physics Quiz</a></li>
                </ul>
            </nav>
        </div>
    </header>
    <div class="container">
        <label style="font-size: 24px;" id="score-label">Score: 0</label>
    </div>
    <div class="equation-div">
        <p id="equation"></p>

    </div>
    <form id="quiz-form">
        <div class="container" style="height: 2rem;">
            <input id="input-box" class="hidden" placeholder="Digite a resposta">
            <button id="submit-btn" type="submit" class="hidden">Submit</button>
        </div>
        <div class="container" style="margin-top: 1rem;">
            <span id="quiz-warn-msg"></span>
        </div>
    </form>
    <div class="container" style="margin-top: 1rem;" id="instructions-div">
        <h4>Instruções</h4>
    </div>
    <div id="instruction">
        <ul>
            <li>Para raiz utilize: sqrt(), ex.: √ 3 = sqrt(3)</li>
            <li>Para potênciação utilize: ^, ex.: 2³ = 2^3</li>
            <li>Para divisão utilize: /, ex.: 10 ÷ 2 = 10/2</li>
        </ul>
    </div>
    <footer>
        <div id="footer_container">
            <h6 id="footer_span">by Agst</h6>
        </div>
    </footer>
</body>
<script src="../js/startQuiz_math_random.js"></script>
<link rel="stylesheet" href="../style/index.css">
<link rel="stylesheet" href="../style/mathquiz.css">
<link rel="stylesheet" href="../style/quiz-img.css">
<script src="../js/startQuiz_math.js"></script>
</html>
